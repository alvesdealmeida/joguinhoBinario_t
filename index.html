<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Binário | Mobile Decoder</title>
    <style>
        :root {
            --bg: #000000;
            --accent: #00ff66;
            --text: #ffffff;
            --secondary: #555555;
            --cell-size: 45px;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* BLOQUEIO PARA DESKTOP */
        #desktop-blocker {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 10000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border: 10px solid #111;
            box-sizing: border-box;
        }

        @media (min-width: 1025px) {
            #desktop-blocker { display: flex; }
            #app-container, #matrixBg { display: none; }
        }

        #matrixBg {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
            opacity: 0.3;
        }

        #app-container {
            position: relative;
            z-index: 2;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
        }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; }
        .active { display: flex; }

        .menu-container { margin: auto; text-align: center; width: 85%; z-index: 5; }

        .fases-wrapper {
            display: flex; justify-content: center;
            gap: 12px; margin: 25px 0;
        }

        .fase-btn { 
            flex: 1; height: 90px; 
            background: rgba(10,10,10,0.8); border: 2px solid #222; 
            border-radius: 20px; color: #fff; cursor: pointer;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; font-size: 1.2rem; font-weight: bold;
            transition: 0.3s; opacity: 0.3;
        }
        
        .fase-btn.liberada { border-color: var(--accent); opacity: 1; box-shadow: 0 0 15px rgba(0,255,102,0.2); }

        .header-jogo {
            padding: 20px; background: rgba(0, 0, 0, 0.9);
            border-bottom: 1px solid #222; display: flex;
            justify-content: space-between; align-items: center;
        }

        #timer-display { font-family: monospace; font-size: 1.6rem; color: #ff3e00; font-weight: bold; }

        .game-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }

        .binary-box {
            font-family: 'Courier New', monospace; background: rgba(10,10,10,0.9);
            padding: 15px; border-radius: 12px; color: var(--accent);
            font-size: 1.1rem; letter-spacing: 5px; margin-bottom: 20px;
            border: 1px solid #333; text-align: center;
        }

        .grid { display: grid; gap: 6px; padding: 15px; background: rgba(20,20,20,0.9); border-radius: 15px; border: 1px solid #333; }

        .cell { width: var(--cell-size); height: var(--cell-size); background: #222; border-radius: 6px; border: 1px solid #444; transition: 0.1s; }
        .cell.active { background: var(--accent); box-shadow: 0 0 15px var(--accent); border-color: #fff; }

        .footer-controls { padding: 20px; background: #000; display: flex; gap: 15px; border-top: 1px solid #222; }

        .btn-game { flex: 1; padding: 18px; border-radius: 15px; font-weight: 900; border: none; text-transform: uppercase; cursor: pointer; }
        .btn-compilar { background: var(--accent); color: #000; }
        .btn-limpar { background: transparent; color: #fff; border: 1px solid #444; }

        @media (max-width: 400px) { :root { --cell-size: 35px; } }
    </style>
</head>
<body>

<div id="desktop-blocker">
    <h1 style="color: var(--accent); font-size: 3rem; margin: 0;">OFFLINE</h1>
    <p style="letter-spacing: 2px;">ACESSO RESTRITO A DISPOSITIVOS MÓVEIS</p>
    <div style="font-family: monospace; opacity: 0.5;">ERR_NON_PORTABLE_DEVICE</div>
</div>

<canvas id="matrixBg"></canvas>

<div id="app-container">
    <!-- MENU -->
    <div id="telaMenu" class="screen active">
        <div class="menu-container">
            <h1 style="font-size: 2.2rem; margin:0; letter-spacing:-1px;">PIXEL BINÁRIO</h1>
            <p style="color:var(--secondary); font-size:0.7rem; letter-spacing:4px;">TERMINAL DECODIFICADOR</p>
            <div class="fases-wrapper">
                <button id="fase0" class="fase-btn" onclick="jogarNivel(0)">01</button>
                <button id="fase1" class="fase-btn" onclick="jogarNivel(1)">02</button>
                <button id="fase2" class="fase-btn" onclick="jogarNivel(2)">03</button>
            </div>
        </div>
    </div>

    <!-- JOGO -->
    <div id="jogoTela" class="screen">
        <div class="header-jogo">
            <button onclick="irParaHome()" style="background:none; border:1px solid #444; color:#888; padding:8px 15px; border-radius:10px;">VOLTAR</button>
            <div id="timer-display">00:00</div>
            <div style="text-align:right">
                <div id="statusFase" style="color:var(--accent); font-weight:bold; font-size:0.6rem;">MOD_01</div>
                <div id="nomeObjeto" style="font-weight:900; font-size:0.8rem;">DATA.EXE</div>
            </div>
        </div>
        <div class="game-content">
            <div id="binaryDisplay" class="binary-box"></div>
            <div id="gridDisplay" class="grid"></div>
        </div>
        <div class="footer-controls">
            <button class="btn-game btn-limpar" onclick="limpar()">Limpar</button>
            <button class="btn-game btn-compilar" onclick="validar()">Compilar</button>
        </div>
    </div>
</div>

<script>
    // --- SISTEMA DE SOM ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSfx(freq, type, dur, vol = 0.1) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    const sons = {
        click: () => playSfx(600, 'square', 0.1),
        sucesso: () => { playSfx(500, 'sine', 0.2); setTimeout(()=>playSfx(800, 'sine', 0.4), 150); },
        erro: () => playSfx(150, 'sawtooth', 0.4, 0.2),
        tick: () => playSfx(1200, 'sine', 0.05, 0.05)
    };

    // --- EFEITO MATRIX ---
    const canvas = document.getElementById('matrixBg');
    const ctx = canvas.getContext('2d');
    let drops = [];
    function initMatrix() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        drops = Array(Math.floor(canvas.width / 18)).fill(1);
    }
    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0f6";
        ctx.font = "15px monospace";
        drops.forEach((y, i) => {
            const text = Math.floor(Math.random() * 2);
            ctx.fillText(text, i * 18, y * 18);
            if (y * 18 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    window.addEventListener('resize', initMatrix);
    initMatrix(); setInterval(drawMatrix, 50);

    // --- LÓGICA DO JOGO ---
    const NIVEIS = [
        {m:["0110","1111","1111","0110"], n:"CÁPSULA", t:30},
        {m:["011110","100001","101101","101101","100001","011110"], n:"VISOR", t:45},
        {m:["00111100","01111110","11011011","11111111","11111111","11011011","01111110","00111100"], n:"CORE", t:60}
    ];

    let nivelAtual = 0;
    let timerId = null;
    let progresso = parseInt(localStorage.getItem('pixelProgresso')) || 0;

    function jogarNivel(idx) {
        if(idx > progresso) { sons.erro(); return; }
        nivelAtual = idx;
        const dados = NIVEIS[idx];
        
        document.getElementById('telaMenu').classList.remove('active');
        document.getElementById('jogoTela').classList.add('active');
        document.getElementById('binaryDisplay').innerHTML = dados.m.join('<br>');
        document.getElementById('nomeObjeto').textContent = dados.n;
        document.getElementById('statusFase').textContent = `MOD_0${idx+1}`;

        const grid = document.getElementById('gridDisplay');
        grid.innerHTML = "";
        grid.style.gridTemplateColumns = `repeat(${dados.m[0].length}, 1fr)`;
        
        dados.m.forEach(linha => {
            [...linha].forEach(bit => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.bit = bit;
                cell.onclick = () => { sons.click(); cell.classList.toggle('active'); };
                grid.appendChild(cell);
            });
        });

        iniciarTimer(dados.t);
    }

    function iniciarTimer(segundos) {
        clearInterval(timerId);
        let t = segundos;
        const display = document.getElementById('timer-display');
        timerId = setInterval(() => {
            t--;
            let m = Math.floor(t/60), s = t%60;
            display.textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            if(t <= 5 && t > 0) sons.tick();
            if(t <= 0) { clearInterval(timerId); sons.erro(); alert("TEMPO ESGOTADO!"); irParaHome(); }
        }, 1000);
    }

    function validar() {
        const cells = document.querySelectorAll('.cell');
        let erro = false;
        cells.forEach(c => {
            const is1 = c.dataset.bit === "1";
            const active = c.classList.contains('active');
            if((is1 && !active) || (!is1 && active)) erro = true;
        });

        if(!erro) {
            clearInterval(timerId);
            sons.sucesso();
            alert("SISTEMA DECODIFICADO!");
            if(nivelAtual === progresso && progresso < 2) {
                progresso++;
                localStorage.setItem('pixelProgresso', progresso);
            }
            irParaHome();
        } else {
            sons.erro();
            alert("SEQUÊNCIA INCORRETA!");
        }
    }

    function irParaHome() {
        clearInterval(timerId);
        document.getElementById('jogoTela').classList.remove('active');
        document.getElementById('telaMenu').classList.add('active');
        atualizarMenu();
    }

    function atualizarMenu() {
        for(let i=0; i<3; i++) {
            const btn = document.getElementById(`fase${i}`);
            btn.classList.toggle('liberada', i <= progresso);
        }
    }

    function limpar() {
        sons.click();
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
    }

    atualizarMenu();
</script>
</body>
</html>
